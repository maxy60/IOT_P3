apiVersion: apps/v1
kind: Deployment

metadata:
  name: wil
  namespace: dev

spec:
  replicas: 1

  selector:
    matchLabels:
      app: wil

  template:
    metadata:
      labels:
        app: wil

    spec:
      containers:
        - name: wil
          image: wil42/playground:v2

          ports:
            - containerPort: 8888

---
apiVersion: v1
kind: Service

metadata:
  name: wil-service
  namespace: dev

spec:
  selector:
    app: wil

  ports:
    - protocol: TCP
      port: 8888
      targetPort: 8888

---
apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: wil-ingress
  namespace: dev

spec:
  rules:
    - host: wil.local

      http:
        paths:
          - path: /
            pathType: Prefix

            backend:
              service:
                name: wil-service

                port:
                  number: 8888
